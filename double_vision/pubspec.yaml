name: double_vision
description: "DoubleNaught Flutter front-end, built on the Vyuh framework."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Native/web file open dialog; XFile.openRead() gives a byte stream.
  file_selector: ^1.1.0

  # HTTP client for node→backend calls (e.g. the SAM3 segmentation API).
  http: ^1.6.0

  # State management used by Vyuh
  mobx: ^2.3.0+1
  flutter_mobx: ^2.2.0+2
  go_router: ^17.0.0  # pinned by vyuh_core; ^14 cannot resolve
  flutter_riverpod: ^2.0.0

  # Sanity integration
  sanity_client: ^1.9.1
  flutter_sanity_portable_text: ^1.8.1

  # Vyuh framework
  vyuh_core: ^1.0.0
  vyuh_extension_content: ^1.32.0
  vyuh_feature_system: ^1.0.0
  vyuh_plugin_content_provider_sanity: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/png/
    - assets/svg/
